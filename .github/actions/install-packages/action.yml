name: 'Install packages'
description: 'Install required packages'

runs:
  using: "composite"
  steps:
    # Common Linux dependencies
    - name: Install Linux Dependencies
      shell: bash
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install ninja-build libsodium-dev pkg-config
        # Bootstrap vcpkg in the workspace and install common libraries
        if [ ! -d "${GITHUB_WORKSPACE}/vcpkg" ]; then
          git clone https://github.com/microsoft/vcpkg.git "${GITHUB_WORKSPACE}/vcpkg"
          bash "${GITHUB_WORKSPACE}/vcpkg/bootstrap-vcpkg.sh"
        fi
        # Install packages for x64-linux triplet (best-effort)
        "${GITHUB_WORKSPACE}/vcpkg/vcpkg" install libsodium:x64-linux raylib:x64-linux rmlui:x64-linux || true

    - name: Install valgrind
      shell: bash
      if: runner.os == 'Linux' && matrix.runs_valgrind == true
      run: |
        # sudo apt-get update
        sudo apt-get install --no-install-recommends valgrind

    # macOS dependencies
    - name: Install macOS Dependencies
      shell: bash
      if: runner.os == 'macOS'
      run: |
        brew install libsodium pkg-config
        # Bootstrap vcpkg in the workspace and install common libraries
        if [ ! -d "${GITHUB_WORKSPACE}/vcpkg" ]; then
          git clone https://github.com/microsoft/vcpkg.git "${GITHUB_WORKSPACE}/vcpkg"
          bash "${GITHUB_WORKSPACE}/vcpkg/bootstrap-vcpkg.sh"
        fi
        # Install packages for x64-osx triplet (best-effort)
        "${GITHUB_WORKSPACE}/vcpkg/vcpkg" install libsodium:x64-osx raylib:x64-osx rmlui:x64-osx || true

    # Windows dependencies
    - name: Install Windows Dependencies (vcpkg)
      shell: powershell
      if: runner.os == 'Windows'
      run: |
        choco install pkgconfiglite -y
        # Ensure vcpkg is present and bootstrapped at C:\vcpkg
        if (!(Test-Path 'C:\vcpkg')) {
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          & C:\vcpkg\bootstrap-vcpkg.bat
        }
        # Integrate and install libsodium for x64-windows triplet
        & C:\vcpkg\vcpkg.exe integrate install
        & C:\vcpkg\vcpkg.exe install libsodium:x64-windows
        # Install libsodium for MinGW triplet so MinGW jobs can find it
        & C:\vcpkg\vcpkg.exe install libsodium:x64-mingw-dynamic
