name: 'Install packages'
description: 'Install required packages'

runs:
  using: "composite"
  steps:
    # Common Linux dependencies
    - name: Install Linux Dependencies
      shell: bash
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install ninja-build libsodium-dev pkg-config

    - name: Install valgrind
      shell: bash
      if: runner.os == 'Linux' && matrix.runs_valgrind == true
      run: |
        # sudo apt-get update
        sudo apt-get install --no-install-recommends valgrind

    # macOS dependencies
    - name: Install macOS Dependencies
      shell: bash
      if: runner.os == 'macOS'
      run: |
        brew install libsodium pkg-config

    # Windows dependencies
    - name: Install Windows Dependencies (vcpkg)
      shell: powershell
      if: runner.os == 'Windows'
      run: |
        choco install pkgconfiglite -y
        vcpkg integrate install
        vcpkg install libsodium:x64-windows
